name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:5.0
        ports:
          - 27017:27017
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: syncroute-backend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./syncroute-backend
      run: npm ci
    
    - name: Run tests
      working-directory: ./syncroute-backend
      run: npm test
      env:
        MONGODB_URI: mongodb://localhost:27017/syncroute-test
        JWT_SECRET: test_secret_key

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: syncroute-frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./syncroute-frontend
      run: npm ci
    
    - name: Run tests
      working-directory: ./syncroute-frontend
      run: npm test
    
    - name: Build
      working-directory: ./syncroute-frontend
      run: npm run build
